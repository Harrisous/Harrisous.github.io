<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HARRY // GRAPH_OS — Haochen Li</title>
<link rel="icon" type="image/png" href="./images/profile.png" />

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cyber: {
            black:     '#020202',
            dark:      '#050508',
            darker:    '#0a0a12',
            panel:     '#0c0c18',
            line:      'rgba(0,195,217,0.18)',
            neonBlue:  '#00e5ff',
            neonCyan:  '#00c3d9',
            neonPink:  '#ff00c8',
            neonMag:   '#d900d9',
            neonYellow:'#f5e663',
            neonLime:  '#a7ff4c',
            dim:       'rgba(0, 195, 217, 0.05)',
            dimPink:   'rgba(255, 0, 200, 0.08)',
          }
        },
        fontFamily: {
          mono:    ['"JetBrains Mono"', '"Courier New"', 'Courier', 'monospace'],
          display: ['"Share Tech Mono"', '"Courier New"', 'monospace'],
        }
      }
    }
  };
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- SoundCloud Widget API (preloaded so window.SC is ready on first avatar click) -->
<script src="https://w.soundcloud.com/player/api.js"></script>

<style>
  html, body {
    background: #020202;
    color: #e6fbff;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(0, 229, 255, 0.10), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(255, 0, 200, 0.08), transparent 60%),
      linear-gradient(180deg, #020205 0%, #04040a 100%);
    min-height: 100vh;
  }

  /* ------- Scrollbar ------- */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #00c3d9; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #ff00c8; }

  /* ------- Scanlines ------- */
  @keyframes scrollScanlines { 0% { background-position: 0 0; } 100% { background-position: 0 200px; } }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0, 229, 255, 0.03) 0px,
      rgba(0, 229, 255, 0.03) 1px,
      transparent 1px,
      transparent 4px
    );
    animation: scrollScanlines 8s linear infinite;
    pointer-events: none; z-index: 60; mix-blend-mode: screen;
  }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 59;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  /* ------- Glitch text ------- */
  @keyframes glitch-1 {
    0%,100%{clip-path:inset(0 0 90% 0)} 20%{clip-path:inset(40% 0 50% 0)}
    40%{clip-path:inset(10% 0 80% 0)} 60%{clip-path:inset(60% 0 20% 0)}
    80%{clip-path:inset(30% 0 55% 0)}
  }
  @keyframes glitch-2 {
    0%,100%{clip-path:inset(80% 0 2% 0)} 20%{clip-path:inset(15% 0 70% 0)}
    40%{clip-path:inset(55% 0 25% 0)} 60%{clip-path:inset(5% 0 85% 0)}
    80%{clip-path:inset(70% 0 10% 0)}
  }
  .glitch-text { position: relative; display: inline-block; }
  .glitch-text::before, .glitch-text::after {
    content: attr(data-text); position: absolute; inset: 0;
    background: transparent; overflow: hidden; pointer-events: none;
  }
  .glitch-text::before { color: #00e5ff; transform: translate(-2px, 1px); animation: glitch-1 2.6s infinite linear alternate-reverse; opacity: .9; }
  .glitch-text::after  { color: #ff00c8; transform: translate( 2px,-1px); animation: glitch-2 3.1s infinite linear alternate-reverse; opacity: .9; }

  /* ------- Reveal ------- */
  @keyframes glitch-appear {
    0%   { clip-path: inset(45% 0 45% 0); opacity: 0; transform: translateY(6px); }
    20%  { clip-path: inset(10% 0 70% 0); opacity: 1; }
    40%  { clip-path: inset(60% 0 10% 0); }
    60%  { clip-path: inset(20% 0 40% 0); }
    80%  { clip-path: inset(0 0 10% 0);   }
    100% { clip-path: inset(0);            opacity: 1; transform: translateY(0); }
  }
  .glitch-appear { animation: glitch-appear .7s steps(6) both; }

  @keyframes fade-up { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .fade-up { animation: fade-up .45s ease-out both; }

  /* ------- Cursor blink ------- */
  @keyframes blink { 50% { opacity: 0; } }
  .blink { animation: blink 1s steps(1) infinite; }

  /* ------- Panel ------- */
  .cyber-panel {
    background:
      linear-gradient(140deg, rgba(0,229,255,0.05), transparent 45%),
      rgba(10, 12, 22, 0.82);
    border: 1px solid rgba(0, 229, 255, 0.22);
    backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.05) inset,
      0 10px 40px rgba(0,0,0,0.6);
    clip-path: polygon(0 12px, 14px 0, calc(100% - 14px) 0, 100% 12px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
  }
  .cyber-panel::before {
    content: ""; position: absolute; left: 0; top: 18%; height: 64%; width: 2px;
    background: linear-gradient(180deg, transparent, #00e5ff, transparent);
    box-shadow: 0 0 8px #00e5ff;
  }
  .cyber-chip {
    border: 1px solid rgba(0, 229, 255, 0.35);
    background: rgba(0, 229, 255, 0.06);
    color: #a9f3ff;
    padding: 2px 10px;
    font-size: 11px; letter-spacing: 0.06em;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }
  .cyber-chip.pink { border-color: rgba(255,0,200,0.45); background: rgba(255,0,200,0.08); color: #ffb8ea; }

  .hud-corner { position: absolute; width: 18px; height: 18px; border: 1px solid #00e5ff; }
  .hud-tl { top:-1px; left:-1px; border-right: none; border-bottom: none; }
  .hud-tr { top:-1px; right:-1px; border-left: none; border-bottom: none; }
  .hud-bl { bottom:-1px; left:-1px; border-right: none; border-top: none; }
  .hud-br { bottom:-1px; right:-1px; border-left: none; border-top: none; }

  /* ------- Profile avatar ------- */
  .avatar-ring {
    position: relative; width: 128px; height: 128px; border-radius: 50%;
    background: radial-gradient(circle at 30% 20%, rgba(0,229,255,0.45), transparent 65%),
                radial-gradient(circle at 70% 80%, rgba(255,0,200,0.35), transparent 65%),
                #040410;
    box-shadow: 0 0 30px rgba(0,229,255,0.25), inset 0 0 18px rgba(255,0,200,0.15);
  }
  @media (min-width: 768px) { .avatar-ring { width: 168px; height: 168px; } }
  .avatar-ring img { position: absolute; inset: 6px; width: calc(100% - 12px); height: calc(100% - 12px); border-radius: 50%; object-fit: cover; }

  @keyframes audio-pulse {
    0%{box-shadow:0 0 0 0 rgba(255,0,200,0.55),0 0 30px rgba(0,229,255,0.25)}
    70%{box-shadow:0 0 0 16px rgba(255,0,200,0),0 0 30px rgba(0,229,255,0.25)}
    100%{box-shadow:0 0 0 0 rgba(255,0,200,0),0 0 30px rgba(0,229,255,0.25)}
  }
  .avatar-playing { animation: audio-pulse 1.6s infinite; }

  /* Orbiting particles */
  @keyframes orbit1 {
    from { transform: rotate(0deg)   translateX(80px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
  }
  @keyframes orbit2 {
    from { transform: rotate(180deg) translateX(100px) rotate(0deg); }
    to   { transform: rotate(540deg) translateX(100px) rotate(-360deg); }
  }
  @keyframes orbit3 {
    from { transform: rotate(90deg)  translateX(120px) rotate(0deg); }
    to   { transform: rotate(450deg) translateX(120px) rotate(-360deg); }
  }
  .orbit-wrap { position: absolute; inset: 0; pointer-events: none; }
  .orbit-dot {
    position: absolute; left: 50%; top: 50%; width: 6px; height: 6px;
    border-radius: 50%; background: #00e5ff; box-shadow: 0 0 10px #00e5ff;
    margin-left:-3px; margin-top:-3px; transform-origin: center;
  }
  .orbit-dot.d1 { animation: orbit1 9s linear infinite; }
  .orbit-dot.d2 { animation: orbit2 13s linear infinite; background:#ff00c8; box-shadow: 0 0 10px #ff00c8; }
  .orbit-dot.d3 { animation: orbit3 17s linear infinite; background:#f5e663; box-shadow: 0 0 10px #f5e663; }

  /* ------- Rails (active centered, inactive stacked to the right) ------- */
  .rails-area {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .rail-group {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 480px;
    display: flex;
    align-items: center;
    gap: 14px;
    transform: translate(-50%, -50%);
    transform-origin: left center;
    transition: transform .55s cubic-bezier(.4,0,.2,1),
                opacity .5s ease,
                filter .55s ease;
    will-change: transform, opacity, filter;
  }
  .rail-group.active {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    filter: none;
    z-index: 20;
    pointer-events: auto;
  }
  /* Inactive rings peek out to the right, stacked behind */
  .rail-group.slot-next {
    transform: translate(calc(-50% + 140px), calc(-50% - 30px)) scale(0.78);
    opacity: 0.4;
    filter: blur(0.5px) saturate(.7);
    z-index: 15;
    pointer-events: auto;
    cursor: pointer;
  }
  .rail-group.slot-prev {
    transform: translate(calc(-50% + 260px), calc(-50% + 8px)) scale(0.62);
    opacity: 0.25;
    filter: blur(1.4px) saturate(.55);
    z-index: 10;
    pointer-events: auto;
    cursor: pointer;
  }
  .rail-group.slot-next:hover,
  .rail-group.slot-prev:hover {
    opacity: 0.85;
    filter: none;
  }

  .rail-arrows {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
  }
  .rail-arrow {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(0,229,255,0.5);
    color: #00e5ff;
    background: rgba(0,229,255,0.04);
    font-size: 14px; cursor: pointer;
    clip-path: polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    transition: all .25s;
    text-shadow: 0 0 6px rgba(0,229,255,0.5);
  }
  .rail-arrow:hover {
    background: rgba(255,0,200,0.14);
    color: #fff;
    border-color: #ff00c8;
    box-shadow: 0 0 16px rgba(255,0,200,0.45);
    text-shadow: 0 0 8px #ff00c8;
  }

  /* Folder-style rail panel: the top-left has a raised "tab" for the title.
     Tab geometry: x = 12..190, y = 0..30. Main body starts at y = 30. */
  .rail-panel {
    position: relative;
    flex: 1;
    padding: 44px 22px 22px 28px;
    background:
      linear-gradient(140deg, rgba(0,229,255,0.06), transparent 45%),
      rgba(10, 12, 22, 0.85);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.55);
    clip-path: polygon(
      12px 0,
      190px 0,
      202px 30px,
      calc(100% - 14px) 30px,
      100% 44px,
      100% calc(100% - 12px),
      calc(100% - 12px) 100%,
      10px 100%,
      0 calc(100% - 12px),
      0 44px,
      0 30px,
      12px 30px
    );
  }
  .rail-panel::before {
    /* Thin cyan line along the inside-left edge of the main body */
    content: ""; position: absolute;
    left: 0; top: 44px; bottom: 12px; width: 2px;
    background: linear-gradient(180deg, transparent, rgba(0,229,255,0.5), transparent);
    box-shadow: 0 0 8px rgba(0,229,255,0.6);
  }
  .rail-panel::after {
    /* Faint neon border that follows the folder shape */
    content: ""; position: absolute; inset: 0;
    border: 1px solid rgba(0, 229, 255, 0.28);
    clip-path: inherit;
    pointer-events: none;
  }
  .rail-tag {
    position: absolute;
    top: 0; left: 12px;
    width: 190px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: .35em;
    color: #00e5ff;
    text-shadow: 0 0 8px rgba(0,229,255,0.65);
    background: linear-gradient(180deg, rgba(0,229,255,0.14), rgba(0,229,255,0.04));
    border-bottom: 1px solid rgba(0,229,255,0.35);
    z-index: 2;
  }
  .rail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 2px 0 6px;
  }
  .rail-items {
    height: 430px;
    overflow: hidden;
    padding: 32px 2px 32px 2px;
    mask-image: linear-gradient(180deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 14%, #000 86%, transparent 100%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
  }

  .rail-panel.rail-breath::after {
    animation: rail-breath-glow 2.8s ease-in-out infinite;
  }
  @keyframes rail-breath-glow {
    0%,100% { border-color: rgba(0,229,255,0.32); box-shadow: inset 0 0 22px rgba(0,229,255,0.1); }
    50%     { border-color: rgba(255,0,200,0.55); box-shadow: inset 0 0 30px rgba(255,0,200,0.15); }
  }

  /* ------- Ring tabs (quick switcher above rails) ------- */
  .ring-tabs {
    display: flex; gap: 10px; align-items: center;
    justify-content: center;
    padding: 0 24px;
  }
  .ring-tab {
    flex: 0 0 170px;
    width: 170px; height: 54px;
    padding: 0 14px;
    display: flex; align-items: center; justify-content: center;
    box-sizing: border-box;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: .3em;
    color: rgba(230, 251, 255, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.25);
    background: linear-gradient(140deg, rgba(0,229,255,0.03), rgba(10,12,22,0.65));
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    transition: all .3s;
    text-align: center; cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .ring-tab:hover { color: #a9f3ff; border-color: rgba(0,229,255,0.55); }
  .ring-tab.active {
    color: #fff;
    border-color: #00e5ff;
    background: linear-gradient(140deg, rgba(0,229,255,0.22), rgba(255,0,200,0.08));
    box-shadow: 0 0 22px rgba(0,229,255,.4), inset 0 0 16px rgba(0,229,255,.18);
    text-shadow: 0 0 10px #00e5ff;
  }
  .ring-tab.active.k-blogs {
    border-color: #ff00c8;
    background: linear-gradient(140deg, rgba(255,0,200,0.22), rgba(0,229,255,0.08));
    box-shadow: 0 0 22px rgba(255,0,200,.4), inset 0 0 16px rgba(255,0,200,.18);
    text-shadow: 0 0 10px #ff00c8;
  }
  .ring-tab.active.k-resources {
    border-color: #f5e663;
    background: linear-gradient(140deg, rgba(245,230,99,0.22), rgba(0,229,255,0.08));
    box-shadow: 0 0 22px rgba(245,230,99,.35), inset 0 0 16px rgba(245,230,99,.18);
    text-shadow: 0 0 10px #f5e663;
  }
  .ring-tab .tab-count {
    display: inline-block; margin-left: 8px;
    font-size: 10px; opacity: .65; letter-spacing: .15em;
  }
  .ring-tab-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 10px; vertical-align: middle;
    background: currentColor; box-shadow: 0 0 8px currentColor;
  }

  /* ------- Inline expand profile panel (desktop) ------- */
  .expand-slot {
    position: relative;
    width: 0;
    transition: width .55s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    flex-shrink: 0;
  }
  .expand-slot.open { width: 460px; }
  .expand-panel {
    width: 440px;
    max-height: calc(100vh - 140px);
    overflow-y: auto;
    padding: 26px 28px;
    opacity: 0;
    transform: translateX(-30px) scale(.96);
    transition: opacity .45s .1s, transform .5s .1s;
  }
  .expand-slot.open .expand-panel { opacity: 1; transform: none; }
  @keyframes expand-glitch {
    0%   { clip-path: inset(40% 0 40% 0); filter: hue-rotate(90deg); }
    30%  { clip-path: inset(0 40% 60% 0); }
    60%  { clip-path: inset(60% 0 0 40%); filter: none; }
    100% { clip-path: inset(0); }
  }
  .expand-slot.open .expand-panel { animation: expand-glitch .45s steps(5) both; animation-delay: .05s; }

  /* ------- Neon glow utilities ------- */
  .neon-glow-blue   { text-shadow: 0 0 10px rgba(0,229,255,.75), 0 0 22px rgba(0,229,255,.35); }
  .neon-glow-pink   { text-shadow: 0 0 10px rgba(255,0,200,.75), 0 0 22px rgba(255,0,200,.35); }
  .neon-glow-yellow { text-shadow: 0 0 9px  rgba(245,230,99,.75), 0 0 20px rgba(245,230,99,.3); }
  .neon-box-blue { box-shadow: 0 0 18px rgba(0,229,255,.25), inset 0 0 12px rgba(0,229,255,.1); }

  /* ------- Contact icon buttons (identity block) ------- */
  .contact-icon {
    width: 42px; height: 42px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(0,229,255,0.5);
    color: #00e5ff;
    background: linear-gradient(140deg, rgba(0,229,255,0.05), rgba(10,12,22,0.5));
    clip-path: polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    transition: all .25s;
  }
  .contact-icon svg { width: 20px; height: 20px; }
  .contact-icon:hover {
    color: #fff;
    background: rgba(255,0,200,0.18);
    border-color: #ff00c8;
    box-shadow: 0 0 16px rgba(255,0,200,0.5);
    transform: translateY(-2px);
  }

  /* ------- Detail close button ------- */
  .detail-close {
    position: absolute; top: 14px; right: 14px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: #ff00c8; font-size: 18px;
    border: 1px solid rgba(255,0,200,0.55);
    background: rgba(12,6,18,0.75);
    clip-path: polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    transition: all .2s;
    z-index: 10;
  }
  .detail-close:hover {
    color: #fff;
    background: rgba(255,0,200,0.25);
    box-shadow: 0 0 16px rgba(255,0,200,0.55);
  }

  .item-card {
    position: relative;
    border: 1px solid rgba(0,229,255,0.2);
    background: linear-gradient(140deg, rgba(0,229,255,0.05), rgba(255,0,200,0.03));
    padding: 12px 14px;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    transition: transform .35s, opacity .35s, border-color .3s, background .3s;
    cursor: pointer;
  }
  .item-card:hover { border-color: rgba(255,0,200,0.55); }
  .item-card.focus {
    border-color: #00e5ff;
    background: linear-gradient(140deg, rgba(0,229,255,0.14), rgba(255,0,200,0.09));
    box-shadow: 0 0 28px rgba(0,229,255,.35), 0 0 0 1px rgba(0,229,255,0.4) inset;
    transform: scale(1.04);
    padding: 14px 16px;
  }
  .item-card.dim { opacity: .45; transform: scale(.94); }
  .item-card.dim-2 { opacity: .22; transform: scale(.88); }
  .item-card.disabled { opacity: .35; border-style: dashed; cursor: not-allowed; }

  /* Stagger fade-in on rail change */
  @keyframes item-stagger { from{opacity:0; transform: translateY(8px);} to{opacity:1; transform:none;} }
  .item-stagger { animation: item-stagger .4s ease-out both; }

  /* ------- Data bus SVG ------- */
  @keyframes dash-flow { to { stroke-dashoffset: -200; } }
  .bus-path {
    stroke-dasharray: 6 6;
    animation: dash-flow 6s linear infinite;
  }
  .bus-path.ticking { animation-duration: 0.7s; }

  /* ------- Detail view ------- */
  .detail-wrap {
    position: fixed; inset: 0;
    z-index: 70;
    display: flex; align-items: center; justify-content: center;
    padding: 80px 24px 24px 24px;
    pointer-events: none;
  }
  .detail-card {
    pointer-events: auto;
    width: min(960px, 92vw);
    max-height: calc(100vh - 120px);
    overflow: auto;
  }

  /* ------- Dossier ------- */
  .dossier {
    position: fixed; top: 0; right: 0; height: 100vh;
    width: min(520px, 92vw);
    z-index: 65;
    transform: translateX(110%);
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    background: linear-gradient(180deg, rgba(8,10,20,0.95), rgba(6,6,16,0.95));
    border-left: 1px solid rgba(0,229,255,0.3);
    box-shadow: -20px 0 40px rgba(0,0,0,0.6);
  }
  .dossier.open { transform: translateX(0); }

  /* ------- Mini profile tag (when detail open) ------- */
  .profile-mini {
    position: fixed; top: 20px; left: 20px; z-index: 68;
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px;

  /* ------- Link underline ------- */
  .link-cyber { position: relative; }
  .link-cyber::after {
    content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px;
    background: linear-gradient(90deg, transparent, #00e5ff, transparent);
    transform: scaleX(0); transform-origin: left; transition: transform .3s;
  }

  /* ------- Mobile utility ------- */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* ------- Reduced motion ------- */
  @media (prefers-reduced-motion: reduce) {

  /* Focus ring accessibility */

</style>

  /* ============================================================
     Typewriter
     ============================================================ */
  const Typewriter = ({ text, speed = 18, startDelay = 0, onDone, className = '' }) => {
    const [shown, setShown] = useState(0);
    useEffect(() => {
      setShown(0);
      let cancelled = false;
      const start = setTimeout(function tick() {
        let i = 0;
        const step = () => {
          if (cancelled) return;
          i++; setShown(i);
          if (i < text.length) setTimeout(step, speed);
          else onDone && onDone();
        };
        step();
      }, startDelay);
      return () => { cancelled = true; clearTimeout(start); };
    }, [text]);
    return (
      <span className={className}>
        {text.slice(0, shown)}
        <span className="blink text-cyber-neonBlue">▍</span>
      </span>
    );
  };

  /* ============================================================
     Cyberpunk canvas background — layered neural net + matrix rain
     + signal pulses + occasional glitch bars
     ============================================================ */
  const useCyberBackground = () => {
    useEffect(() => {
      const canvas = document.getElementById('bg-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let raf = 0, frame = 0;
      const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      let width = 0, height = 0;
      const resize = () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      };
      resize();

      const isMobile = () => width < 768;

      /* ---------- Hexagonal Water Grid ---------- */
      const hexRadius = isMobile() ? 48 : 64;
      const hexWidth = Math.sqrt(3) * hexRadius;
      const hexHeight = 2 * hexRadius;
      const xOffset = hexWidth;
      const yOffset = hexHeight * 0.75;

      /* ---------- Matrix Rain ---------- */
      const chars = 'アイウエオカキクケコｻｼｽｾｿﾀﾁﾂﾃﾄ01{}[]<>#$%*+=<>/\\';
      let cols = 0;
      let drops = [];
      const buildRain = () => {
        const size = 28; // even larger size = sparser density
        cols = Math.floor(width / size);
        drops = Array.from({ length: cols }).map(() => Math.random() * -height);
      };

      const onResize = () => { resize(); buildRain(); };
      window.addEventListener('resize', onResize);
      buildRain();

      const getProjectedPoint = (vx, vy, t, w, h) => {
        const proj = (vx - vy) * 0.004;
        const wave1 = Math.sin(proj - t);
        const wave2 = Math.sin((vx * 0.002 + vy * 0.005) - t * 1.3) * 0.5;
        const wave3 = Math.sin((vx * 0.006 - vy * 0.002) - t * 0.8) * 0.3;
        const randPhase = Math.sin(vx * 0.012 + vy * 0.078) * 43.75;
        const wave4 = Math.sin(t * 0.6 + randPhase) * 0.25;

        let z = (wave1 + wave2 + wave3 + wave4) / 2.05;
        z = Math.max(-1, Math.min(1, z));

        // 2D longitudinal wave effect (nodes pushed in wave direction)
        const pushAmp = 56; // Amplitude of the push/pull stretching (scaled with radius)
        // wave direction is roughly bottom-left to top-right (+x, -y)
        const dx = z * pushAmp; 
        const dy = -z * pushAmp; 

        // Orthogonal shear to make the pull slightly organic and swirling
        const shear = (wave2 - wave3) * 12;
        
        const px = vx + dx + shear;
        const py = vy + dy + shear;

        return { px, py, z };
      };

      const drawHexagon = (cx, cy, radius, t, globalAlpha, w, h) => {
        const points = [];
        let avgZ = 0;
        for (let i = 0; i < 6; i++) {
          const angle_deg = 60 * i - 30;
          const angle_rad = Math.PI / 180 * angle_deg;
          const vx = cx + radius * Math.cos(angle_rad);
          const vy = cy + radius * Math.sin(angle_rad);
          const p = getProjectedPoint(vx, vy, t, w, h);
          points.push(p);
          avgZ += p.z;
        }
        avgZ /= 6;

        const normZ = (avgZ + 1) / 2; 

        // High: Blue (0, 229, 255)
        const r1 = 0, g1 = 229, b1 = 255;
        // Low: Dark Purple-Red (70, 0, 50)
        const r2 = 70, g2 = 0, b2 = 50;

        const r = Math.floor(r2 + (r1 - r2) * normZ);
        const g = Math.floor(g2 + (g1 - g2) * normZ);
        const b = Math.floor(b2 + (b1 - b2) * normZ);

        // Draw vertices (节点) without edges, making them larger
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${globalAlpha + 0.45})`;
        for (let i = 0; i < 6; i++) {
          ctx.beginPath();
          ctx.arc(points[i].px, points[i].py, 3.5, 0, Math.PI * 2);
          ctx.fill();
        }
      };

      const draw = () => {
        frame++;
        const t = frame * 0.0105; // Slower time (30% reduction)
        
        // Clear background completely to avoid messy trails on moving nodes
        ctx.fillStyle = '#020202';
        ctx.fillRect(0, 0, width, height);

        /* ----- Matrix Rain (Native tails without background smearing) ----- */
        ctx.font = (isMobile() ? '11px' : '13px') + ' "JetBrains Mono", monospace';
        const tailLength = 20; 
        for (let i = 0; i < drops.length; i++) {
          const tailY = drops[i];
          
          for (let j = 0; j < tailLength; j++) {
            const y = tailY - j * 16; 
            if (y < -20) continue; 
            if (y > height + 20) continue;
            
            const ch = chars[Math.floor(Math.random() * chars.length)];
            const alpha = Math.pow(1 - j / tailLength, 1.5) * 0.35; 
            
            if (j === 0) {
              const roll = Math.random();
              if (roll > 0.9) {
                ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 8;
                ctx.fillStyle = `rgba(220, 252, 255, 0.7)`;
              } else {
                ctx.shadowBlur = 0;
                ctx.fillStyle = `rgba(0, 229, 255, 0.5)`;
              }
            } else {
              ctx.shadowBlur = 0;
              ctx.fillStyle = `rgba(0, 229, 255, ${alpha})`;
            }
            ctx.fillText(ch, i * 28, y);
          }
          
          ctx.shadowBlur = 0;
          drops[i] += 4;
          if (drops[i] - tailLength * 16 > height && Math.random() > 0.97) {
            drops[i] = -Math.random() * 200;
          }
        }

        /* ----- Random Red Dead Pixels (Snow with Lens Flare) ----- */
        if (Math.random() > 0.96) { // Halved frequency
          const numGlitches = Math.floor(Math.random() * 2) + 1;
          for (let g = 0; g < numGlitches; g++) {
            const rx = Math.random() * width;
            const ry = Math.random() * height;
            
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            
            // Horizontal trail (Lens Flare)
            const flareWidth = 120 + Math.random() * 240;
            const flareAlpha = 0.2 + Math.random() * 0.3;
            ctx.fillStyle = `rgba(255, 0, 50, ${flareAlpha})`;
            ctx.shadowColor = 'rgba(255, 0, 50, 1)';
            ctx.shadowBlur = 12;
            ctx.fillRect(rx - flareWidth / 2, ry - 1, flareWidth, 2);
            
            // Horizontal sharp dead pixel core
            const rectWidth = 20 + Math.random() * 40;
            const rectHeight = 3 + Math.random() * 3;
            ctx.fillStyle = `rgba(255, 50, 80, ${0.8 + Math.random() * 0.2})`;
            ctx.shadowBlur = 2; // slight glow on the core
            ctx.fillRect(rx - rectWidth / 2, ry - rectHeight / 2, rectWidth, rectHeight);
            
            // Central white/bright-red hot spot
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 0;
            ctx.fillRect(rx - 4, ry - 1, 8, 2);
            
            ctx.restore();
          }
        }

        // Breathing effect around 50% transparency
        const breath = 0.5 + 0.15 * Math.sin(frame * 0.014); // Slower breathing

        // Add padding so perspective distortion doesn't show edges of grid
        const padCols = 4;
        const padRows = 4;
        const cols = Math.ceil(width / xOffset) + padCols;
        const rows = Math.ceil(height / yOffset) + padRows;

        for (let row = -padRows; row < rows; row++) {
          for (let col = -padCols; col < cols; col++) {
            let cx = col * xOffset;
            let cy = row * yOffset;
            if (row % 2 !== 0) {
              cx += xOffset / 2;
            }

            // Ocean movement is now calculated per-vertex in getProjectedPoint
            drawHexagon(cx, cy, hexRadius, t, breath, width, height);
          }
        }

        if (!reduced) raf = requestAnimationFrame(draw);
      };
      draw();

      return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); };
    }, []);
  };

  /* ============================================================
     BGM via SoundCloud iframe
     ============================================================ */
  const useBgm = () => {
    const [playing, setPlaying] = useState(false);
    const [vol, setVol] = useState(50);
    const widgetRef = useRef(null);
    const readyRef = useRef(false);

    const tryInit = () => {
      if (widgetRef.current || !window.SC) return;
      const iframe = document.getElementById('sc-iframe');
      if (!iframe) return;
      widgetRef.current = window.SC.Widget(iframe);
      widgetRef.current.bind(window.SC.Widget.Events.READY, () => {
        readyRef.current = true;
        widgetRef.current.setVolume(vol);
      });
      widgetRef.current.bind(window.SC.Widget.Events.PLAY,  () => setPlaying(true));
      widgetRef.current.bind(window.SC.Widget.Events.PAUSE, () => setPlaying(false));
      widgetRef.current.bind(window.SC.Widget.Events.FINISH,() => setPlaying(false));
    };

    useEffect(() => {
      tryInit();
      if (widgetRef.current) return;
      // Poll briefly in case the SC script is still loading
      let tries = 0;
      const t = setInterval(() => {
        tries++;
        tryInit();
        if (widgetRef.current || tries > 40) clearInterval(t);
      }, 150);
      return () => clearInterval(t);
    }, []);

    const toggle = () => {
      tryInit();
      if (widgetRef.current) widgetRef.current.toggle();
    };
    const setVolume = (v) => {
      setVol(v);
      if (widgetRef.current) widgetRef.current.setVolume(v);
    };
    return { playing, vol, toggle, setVolume };

        {/* GitHub octocat */}
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 1.8c-5.63 0-10.2 4.57-10.2 10.2 0 4.5 2.92 8.32 6.97 9.67.51.1.7-.22.7-.49 0-.24-.01-.88-.01-1.72-2.84.62-3.44-1.37-3.44-1.37-.46-1.18-1.13-1.49-1.13-1.49-.93-.64.07-.62.07-.62 1.03.07 1.57 1.06 1.57 1.06.91 1.57 2.4 1.12 2.98.86.09-.67.36-1.12.65-1.38-2.27-.26-4.66-1.14-4.66-5.07 0-1.12.4-2.04 1.06-2.75-.11-.26-.46-1.3.1-2.72 0 0 .86-.28 2.83 1.05a9.8 9.8 0 0 1 5.15 0c1.97-1.33 2.83-1.05 2.83-1.05.56 1.42.21 2.46.1 2.72.66.71 1.06 1.63 1.06 2.75 0 3.94-2.4 4.81-4.68 5.06.37.32.7.94.7 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.19.6.71.49 4.04-1.35 6.96-5.17 6.96-9.67C22.2 6.37 17.63 1.8 12 1.8z" />

  /* ============================================================
     Rail (single) — vertical cover-flow of items
     ============================================================ */
  const RailItem = ({ item, posOffset, onOpen, isFocused }) => {
    const absOffset = Math.abs(posOffset);
    const className = [
      'item-card item-stagger',
      isFocused ? 'focus' : '',
      absOffset === 1 ? 'dim' : '',
      absOffset >= 2 ? 'dim-2' : '',
      item.active === false ? 'disabled' : '',
    ].join(' ');

    const handleClick = () => {
      if (item.active === false) return;
      onOpen(item);
    };
    return (
      <div
        className={className}
        onClick={handleClick}
        style={{ animationDelay: `${absOffset * 40}ms` }}
        role="button"
        tabIndex={isFocused ? 0 : -1}
        onKeyDown={(e) => { if (e.key === 'Enter') handleClick(); }}

  const Rail = ({ label, slot, items, focusedItemIndex, onChangeIndex, onOpen, isActive, onActivate }) => {
    const railRef = useRef(null);

    // Wheel scrolling (only on active rail)
    useEffect(() => {
      if (!isActive) return;
      const el = railRef.current;
      if (!el) return;
      let lastTick = 0;
      const onWheel = (e) => {
        e.preventDefault();
        const now = Date.now();
        if (now - lastTick < 150) return;
        lastTick = now;
        if (e.deltaY > 0) onChangeIndex(+1);
        else if (e.deltaY < 0) onChangeIndex(-1);
      };
      el.addEventListener('wheel', onWheel, { passive: false });
      return () => el.removeEventListener('wheel', onWheel);
    }, [isActive, onChangeIndex]);

    const visible = useMemo(() => {
      if (!items || items.length === 0) return [];
      // Show up to ±2 around focused (5 items visible, center = focused)
      const out = [];
      const span = Math.min(2, Math.floor(items.length / 2));
      for (let d = -span; d <= span; d++) {
        let idx = (focusedItemIndex + d + items.length) % items.length;
        out.push({ item: items[idx], offset: d, key: `${items[idx].id}-${d}` });
      }
      return out;
    }, [focusedItemIndex, items]);

    return (
      <div
        ref={railRef}
        className={`rail-group ${slot}`}
        onClick={!isActive && onActivate ? (e) => { e.stopPropagation(); onActivate(); } : undefined}
        role="region"
        aria-label={`${label} rail${isActive ? ' (focused)' : ''}`}
      >
        {/* Arrows on LEFT, vertically centered */}
        <div className="rail-arrows">
          <button
            onClick={(e) => { e.stopPropagation(); onChangeIndex(-1); }}
            className="rail-arrow"
            aria-label="Previous item"
            tabIndex={isActive ? 0 : -1}
          >▲</button>
          <button
            onClick={(e) => { e.stopPropagation(); onChangeIndex(+1); }}
            className="rail-arrow"
            aria-label="Next item"
            tabIndex={isActive ? 0 : -1}
          >▼</button>
        </div>

        <div className={`rail-panel ${isActive ? 'rail-breath' : ''}`}>
          <div className="rail-tag">// {label}</div>

          <div className="rail-header">
            <div className="text-[10px] text-cyber-neonBlue/70 font-display tracking-widest">
              {String(focusedItemIndex + 1).padStart(2, '0')} / {String((items || []).length).padStart(2, '0')}
            </div>
            <div className="text-[10px] text-cyber-neonPink/70 font-display tracking-[0.25em] blink">
              [ SCROLL / ↑↓ ]

          </div>

          <div className="rail-items">
            {visible.map(({ item, offset, key }) => (
              <RailItem
                key={key}
                item={item}
                posOffset={offset}
                isFocused={offset === 0}
                onOpen={onOpen}
              />
            ))}

        </div>
      </div>
    );
  };

  /* ============================================================

  /* ============================================================
     Desktop Graph scene
     ============================================================ */
  const GraphScene = ({ data, bgm }) => {
    const ringOrder = ['projects', 'blogs', 'resources']; // loop
    const [focusedRing, setFocusedRing] = useState('projects');
    const [itemIdx, setItemIdx] = useState({ projects: 0, blogs: 0, resources: 0 });
    const [openItem, setOpenItem] = useState(null); // { item, ring }
    const [expanded, setExpanded] = useState(false);
    const [busTick, setBusTick] = useState(false);

    const expandSlotRef = useRef(null);
    const expandBtnRef = useRef(null);

    // Slot assignment for horizontal carousel: active / slot-prev / slot-next
    // Uses modular distance so no ring teleports across on cycle.
    const slotFor = useCallback((ring) => {
      if (ring === focusedRing) return 'active';
      const f = ringOrder.indexOf(focusedRing);
      const r = ringOrder.indexOf(ring);
      const diff = (r - f + 3) % 3; // 1 = next, 2 = prev
      return diff === 1 ? 'slot-next' : 'slot-prev';
    }, [focusedRing]);

    const pulseBus = () => {
      setBusTick(true);
      setTimeout(() => setBusTick(false), 400);
    };

    const cycleRing = useCallback((dir) => {
      const cur = ringOrder.indexOf(focusedRing);
      const next = (cur + dir + 3) % 3;
      setFocusedRing(ringOrder[next]);
      pulseBus();
    }, [focusedRing]);

    const setRingByClick = useCallback((ring) => {
      setFocusedRing(ring);
      pulseBus();
    }, []);

    const changeItem = useCallback((dir) => {
      setItemIdx((prev) => {
        const items = data[focusedRing] || [];
        if (items.length === 0) return prev;
        const cur = prev[focusedRing];
        const next = (cur + dir + items.length) % items.length;
        return { ...prev, [focusedRing]: next };
      });
      pulseBus();
    }, [data, focusedRing]);

    // Keyboard
    useEffect(() => {
      const handler = (e) => {
        if (openItem) return;
        if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); cycleRing(-1); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); cycleRing(+1); }
        else if (e.key === 'ArrowUp')    { e.preventDefault(); changeItem(-1); }
        else if (e.key === 'ArrowDown')  { e.preventDefault(); changeItem(+1); }
        else if (e.key === 'Enter') {
          const items = data[focusedRing];
          const item = items && items[itemIdx[focusedRing]];
          if (item && item.active !== false) setOpenItem({ item, ring: focusedRing });
        } else if (e.key === 'Escape' && expanded) {
          setExpanded(false);
        }
      };
      window.addEventListener('keydown', handler);
      return () => window.removeEventListener('keydown', handler);
    }, [cycleRing, changeItem, focusedRing, itemIdx, openItem, expanded, data]);

    // Click-outside to collapse expand panel
    useEffect(() => {
      if (!expanded) return;
      const onDown = (e) => {
        const slot = expandSlotRef.current;
        const btn  = expandBtnRef.current;
        if (slot && slot.contains(e.target)) return;
        if (btn && btn.contains(e.target)) return;
        setExpanded(false);
      };
      document.addEventListener('mousedown', onDown);
      return () => document.removeEventListener('mousedown', onDown);
    }, [expanded]);

    const counts = {
      projects:  (data.projects  || []).length,
      blogs:     (data.blogs     || []).length,
      resources: (data.resources || []).length,
    };

    return (
      <div className="relative" style={{minHeight: '100vh'}}>
        <DataBus ticking={busTick} />

        {/* Top HUD */}
        <div className="absolute top-5 left-6 right-6 flex items-start justify-between text-[11px] font-display tracking-[0.25em] z-40">
          <a href="./index_apple.html" className="text-cyber-neonBlue hover:text-cyber-neonPink link-cyber neon-glow-blue">[ SWITCH_MODE ]</a>
          <div className="text-right leading-tight">
            <div className="text-cyber-neonBlue neon-glow-blue">SYS :: <span className="text-cyber-neonYellow neon-glow-yellow">GRAPH_OS_v2.0</span></div>
            <div className="text-white/55">KEYS :: ←→ ring  ↑↓ item  ENTER open  ESC back</div>
          </div>
        </div>

        {/* Main layout — centered horizontally */}
        <div className="absolute inset-0 pt-20 pb-12 flex items-stretch justify-center">
          {/* Profile column (fixed width, centered content) */}
          <div className="flex-shrink-0 w-[440px] flex items-center justify-center z-20">
            <ProfileNode
              profile={data.profile}
              minimized={!!openItem}
              onToggleExpand={() => setExpanded((v) => !v)}
              expanded={expanded}
              bgm={bgm}
              expandBtnRef={expandBtnRef}
            />
          </div>

          {/* Inline expand-profile slot (width animates 0 → 460) */}
          <div
            ref={expandSlotRef}
            className={`expand-slot z-20 ${expanded ? 'open' : ''}`}
          >
            <div className="h-full flex items-center px-3">
              <ExpandProfile profile={data.profile} onClose={() => setExpanded(false)} />
            </div>
          </div>

          {/* Rings column — fixed equal width to profile so expand centers */}
          <div className={`flex-shrink-0 w-[560px] relative flex flex-col ${openItem ? 'opacity-25 scale-95' : ''}`}
               style={{transition: 'opacity .4s, transform .4s'}}>
            <div className="flex-shrink-0 pt-1 pb-3">
              <RingTabs rings={ringOrder} focused={focusedRing} counts={counts} onSelect={setRingByClick} />
            </div>
            <div className="rails-area flex-1">
              {ringOrder.map((ring) => {
                const slot = slotFor(ring);
                const isActive = slot === 'active';
                return (
                  <Rail
                    key={ring}
                    label={ring.toUpperCase()}
                    slot={slot}
                    items={data[ring]}
                    focusedItemIndex={itemIdx[ring]}
                    onChangeIndex={(dir) => { if (isActive) changeItem(dir); }}
                    onOpen={(item) => item.active !== false && setOpenItem({ item, ring })}
                    isActive={isActive}
                    onActivate={() => setRingByClick(ring)}
                  />
                );
              })}
            </div>
          </div>
        </div>

        {/* Detail */}
        {openItem && <DetailView item={openItem.item} ring={openItem.ring} onClose={() => setOpenItem(null)} />}

        {/* Footer HUD */}
        <div className="absolute bottom-4 left-6 right-6 flex justify-between items-end text-[10px] font-display tracking-[0.25em] z-40 pointer-events-none">
          <div className="text-cyber-neonBlue/70 neon-glow-blue">
            &copy; 2026 HAOCHEN LI &middot; HARRISOUS.GITHUB.IO
          </div>
          <div className="text-white/40">
            BGM :: THE_REBEL_PATH — P.T.ADAMCZYK
          </div>
        </div>
      </div>
    );
  };

  /* ============================================================
     Mobile scene
     ============================================================ */
  const MobileProfile = ({ profile, onToggleDossier }) => (
    <div className="cyber-panel relative p-5 mt-14">
      <span className="hud-corner hud-tl" />
      <span className="hud-corner hud-tr" />
      <span className="hud-corner hud-bl" />
      <span className="hud-corner hud-br" />
      <div className="flex items-center gap-4">
        <img src={profile.avatar} alt={profile.name} className="w-16 h-16 rounded-full object-cover border border-cyber-neonBlue/50" />
        <div className="flex-1">
          <div className="text-[10px] text-cyber-neonBlue tracking-[0.3em] font-display">// IDENTITY</div>
          <h1 className="text-2xl font-black text-white leading-tight glitch-text" data-text={profile.callsign}>{profile.callsign}</h1>
          <div className="text-cyber-neonYellow/90 text-sm">{profile.name}</div>
        </div>
      </div>
      <div className="text-white/75 text-sm leading-relaxed mt-3">{profile.title}</div>
      <div className="mt-3 pt-3 border-t border-cyber-neonBlue/20 space-y-1">
        {profile.educationShort.map((e, i) => (
          <div key={i} className="text-xs text-cyber-neonCyan/80 tracking-wide">{e}</div>
        ))}
      </div>
      <button
        onClick={onToggleDossier}
        className="mt-4 w-full text-[11px] text-cyber-neonPink border border-cyber-neonPink/40 py-2 tracking-[0.25em] font-display hover:bg-cyber-neonPink/10"
      >[▶] EXPAND_PROFILE</button>
    </div>
  );

  const MobileContact = ({ contact }) => (
    <div className="mt-6">
      <div className="text-[10px] text-cyber-neonBlue tracking-[0.3em] font-display mb-2">// CONTACT</div>
      <div className="grid grid-cols-1 gap-2">
        <a href={`mailto:${contact.email}`} className="cyber-panel relative px-4 py-3 text-sm text-white hover:text-cyber-neonPink">
          <span className="hud-corner hud-tl" /><span className="hud-corner hud-br" />
          <span className="text-cyber-neonBlue mr-2">✉</span> {contact.email}
        </a>
        <a href={contact.linkedin} target="_blank" rel="noreferrer" className="cyber-panel relative px-4 py-3 text-sm text-white hover:text-cyber-neonPink">
          <span className="hud-corner hud-tl" /><span className="hud-corner hud-br" />
          <span className="text-cyber-neonBlue mr-2">in</span> LinkedIn
        </a>
        <a href={contact.github} target="_blank" rel="noreferrer" className="cyber-panel relative px-4 py-3 text-sm text-white hover:text-cyber-neonPink">
          <span className="hud-corner hud-tl" /><span className="hud-corner hud-br" />
          <span className="text-cyber-neonBlue mr-2">gh</span> GitHub
        </a>
      </div>
    </div>
  );

  const MobileBackground = ({ profile }) => (
    <div className="mt-6">
      <div className="text-[10px] text-cyber-neonBlue tracking-[0.3em] font-display mb-2">// BACKGROUND</div>
      <div className="cyber-panel relative p-4">
        <span className="hud-corner hud-tl" /><span className="hud-corner hud-br" />
        <p className="text-sm text-white/80 leading-relaxed">{profile.tagline}</p>
        <div className="mt-3 text-[11px] text-cyber-neonYellow">📍 {profile.location}</div>
      </div>
    </div>
  );

  const MobileSkillsTicker = ({ skills }) => {
    const flat = Object.values(skills || {}).flat().slice(0, 18);
    if (flat.length === 0) return null;
    return (
      <div className="mt-6">
        <div className="text-[10px] text-cyber-neonBlue tracking-[0.3em] font-display mb-2">// SKILLS</div>
        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 -mx-5 px-5">
          {flat.map((s, i) => <span key={i} className="cyber-chip whitespace-nowrap flex-shrink-0">{s}</span>)}
        </div>
      </div>
    );
  };

  const MobileTabs = ({ data, onOpen }) => {
    const [tab, setTab] = useState('projects');
    const tabs = [
      { key: 'projects',  label: 'PROJECTS',  color: 'neonBlue'  },
      { key: 'blogs',     label: 'BLOGS',     color: 'neonPink'  },
      { key: 'resources', label: 'RESOURCES', color: 'neonYellow'},
    ];
    const items = data[tab] || [];
    return (
      <div className="mt-6">
        <div className="flex gap-1">
          {tabs.map((t) => (
            <button
              key={t.key}
              onClick={() => setTab(t.key)}
              className={`flex-1 py-2 text-[11px] font-display tracking-[0.2em] border ${
                tab === t.key
                  ? 'bg-cyber-neonBlue/15 border-cyber-neonBlue text-cyber-neonBlue'
                  : 'border-cyber-neonBlue/20 text-white/50 hover:text-cyber-neonBlue'
              }`}
            >{t.label}</button>
          ))}
        </div>
        <div className="mt-4 space-y-3">
          {items.map((it) => {
            const disabled = it.active === false;
            return (
              <button
                key={it.id}
                onClick={() => !disabled && onOpen({ item: it, ring: tab })}
                disabled={disabled}
                className={`cyber-panel relative w-full text-left p-4 ${disabled ? 'opacity-40 cursor-not-allowed' : 'hover:border-cyber-neonPink/60'} transition-colors`}
              >
                <span className="hud-corner hud-tl" /><span className="hud-corner hud-br" />
                <div className="flex justify-between items-center gap-2">
                  <div className="text-[10px] text-cyber-neonBlue tracking-[0.25em] font-display">{it.id}</div>
                  <div className="text-[10px] text-cyber-neonYellow/80">{it.category}</div>
                </div>
                <div className="mt-1 text-lg font-bold text-white leading-tight">{it.title}</div>
                <div className="text-sm text-white/70 mt-1 line-clamp-2">{it.description}</div>
                {it.stack && it.stack.length > 0 && (
                  <div className="mt-2 flex flex-wrap gap-1.5">
                    {it.stack.slice(0, 4).map((s, i) => <span key={i} className="cyber-chip">{s}</span>)}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>
    );
  };

  const MobileScene = ({ data, bgm }) => {
    const [openItem, setOpenItem] = useState(null);
    const [dossierOpen, setDossierOpen] = useState(false);
    return (
      <div className="px-5 pb-14">
        <div className="flex items-center justify-between pt-4">
          <a href="./index_apple.html" className="text-[11px] text-cyber-neonBlue tracking-[0.2em] font-display link-cyber">[ SWITCH_MODE ]</a>
          <button
            aria-label="Toggle BGM"
            onClick={bgm.toggle}
            className={`text-[11px] text-cyber-neonPink tracking-[0.2em] font-display ${bgm.playing ? 'blink' : ''}`}
          >{bgm.playing ? '◼ BGM_ON' : '▶ BGM'}</button>
        </div>
        <MobileProfile profile={data.profile} onToggleDossier={() => setDossierOpen(true)} />
        <MobileContact contact={data.profile.contact} />
        <MobileBackground profile={data.profile} />
        <MobileSkillsTicker skills={data.profile.skills} />
        <MobileTabs data={data} onOpen={setOpenItem} />

        <Dossier profile={data.profile} open={dossierOpen} onClose={() => setDossierOpen(false)} />
        {openItem && <DetailView item={openItem.item} ring={openItem.ring} onClose={() => setOpenItem(null)} />}

        <div className="mt-10 text-center text-[10px] text-cyber-neonBlue/60 font-display tracking-[0.25em]">
          &copy; 2026 HAOCHEN LI &middot; HARRISOUS.GITHUB.IO
          <div className="mt-1 text-white/40">BGM :: THE_REBEL_PATH — P.T.ADAMCZYK</div>
        </div>
      </div>
    );
  };

  /* ============================================================
     App root
     ============================================================ */
  const App = () => {
    const [data, setData] = useState(null);
    const [isDesktop, setIsDesktop] = useState(() =>
      typeof window !== 'undefined' ? window.matchMedia('(min-width: 768px)').matches : true
    );
    const bgm = useBgm();
    useCyberBackground();

    useEffect(() => {
      const mq = window.matchMedia('(min-width: 768px)');
      const onChange = () => setIsDesktop(mq.matches);
      mq.addEventListener('change', onChange);
      return () => mq.removeEventListener('change', onChange);
    }, []);

    useEffect(() => {
      let cancelled = false;
      fetch('./data/rings.json', { cache: 'no-cache' })
        .then((r) => {
          if (!r.ok) throw new Error('no rings.json');
          return r.json();
        })
        .then((json) => { if (!cancelled) setData(json); })
        .catch(() => { if (!cancelled) setData(FALLBACK_DATA); });
      return () => { cancelled = true; };
    }, []);

    if (!data) {
      return (
        <div className="min-h-screen flex items-center justify-center text-cyber-neonBlue font-display tracking-[0.3em] text-sm">
          LOADING :: <span className="blink ml-2">▍</span>
        </div>
      );
    }

    return isDesktop
      ? <GraphScene data={data} bgm={bgm} />
      : <MobileScene data={data} bgm={bgm} />;
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
